    :root {
      --blue: #004cbd;
      --yellow: #dded59;
      --navy: #002e7a;
      --cream: #ebe9da;
      --mid: #3c3fb2;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--blue);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Canvas effects ── */
    #fxCanvas {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 24px;
      background: transparent;
      border-bottom: none;
    }
    header img.logo {
      height: 48px;
      width: auto;
    }

    /* ── Main layout ── */
    main {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 60px;
      gap: 28px;
      min-height: calc(100vh - 85px);
    }

    .page-title {
      text-align: center;
      color: #fff;
      animation: fadeDown 0.8s ease both;
    }
    .page-title h1 {
      font-family: 'ObjektivArabic', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--yellow);
      text-shadow: 0 0 30px rgba(221,237,89,0.5);
    }
    .page-title p {
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Form card ── */
    .form-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.8s ease 0.2s both;
      transition: all 0.5s ease;
    }
    .form-card.hidden {
      opacity: 0;
      transform: translateY(-20px) scale(0.97);
      pointer-events: none;
      height: 0;
      padding: 0;
      overflow: hidden;
      margin: 0;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.8);
      font-size: 0.88rem;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field { margin-bottom: 16px; }

    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: #fff;
      font-family: 'ObjektivArabic', 'Tajawal', sans-serif;
      font-size: 1.05rem;
      outline: none;
      transition: all 0.3s;
    }
    input[type="text"]:focus {
      border-color: var(--yellow);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 3px rgba(221,237,89,0.2);
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }

    /* Phone row */
    .phone-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Country dropdown */
    .country-select-wrap {
      position: relative;
      width: 100%;
    }
    .country-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 16px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      font-size: 1rem;
      transition: all 0.3s;
      user-select: none;
      width: 100%;
    }
    .country-trigger:hover { border-color: var(--yellow); background: rgba(255,255,255,0.18); }
    .country-trigger .flag { font-size: 1.2rem; }
    .country-trigger .code { font-family: monospace; font-size: 0.85rem; color: var(--yellow); }
    .country-trigger .arrow { margin-right: auto; font-size: 0.7rem; opacity: 0.6; transition: transform 0.3s; }
    .country-trigger.open .arrow { transform: rotate(180deg); }

    .country-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 100%;
      min-width: 260px;
      background: #002e7a;
      border: 1px solid rgba(221,237,89,0.3);
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      display: none;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      max-height: 340px;
    }
    .country-dropdown.open { display: flex; }

    .country-search {
      padding: 10px 12px;
      background: rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .country-search input {
      width: 100%;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      font-family: 'Tajawal', sans-serif;
      text-align: right;
    }
    .country-search input::placeholder { color: rgba(255,255,255,0.4); }

    .country-list {
      overflow-y: auto;
      flex: 1;
    }
    .country-list::-webkit-scrollbar { width: 4px; }
    .country-list::-webkit-scrollbar-thumb { background: rgba(221,237,89,0.4); border-radius: 2px; }

    .country-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.9rem;
      color: #fff;
    }
    .country-item:hover { background: rgba(221,237,89,0.12); }
    .country-item.selected { background: rgba(221,237,89,0.2); }
    .country-item .ci-flag { font-size: 1.3rem; flex-shrink:0; }
    .country-item .ci-name { flex:1; text-align: right; }
    .country-item .ci-code { color: var(--yellow); font-family: monospace; font-size: 0.82rem; flex-shrink:0; }

    .phone-input-wrap { width: 100%; }
    .phone-input-wrap input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: #fff;
      font-family: monospace;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
      direction: ltr;
      text-align: left;
    }
    .phone-input-wrap input:focus {
      border-color: var(--yellow);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 3px rgba(221,237,89,0.2);
    }
    .phone-input-wrap input::placeholder { color: rgba(255,255,255,0.35); }

    .btn-gen {
      width: 100%;
      padding: 15px;
      background: var(--yellow);
      border: none;
      border-radius: 14px;
      color: var(--blue);
      font-family: 'ObjektivArabic', 'Tajawal', sans-serif;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 4px;
    }
    .btn-gen:hover { background: #eaf87a; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(221,237,89,0.35); }

    /* ── Card output ── */
    .card-section {
      width: 100%;
      max-width: 480px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeUp 0.7s ease both;
    }
    .card-section.show { display: flex; }

    .card-wrap {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.5);
      position: relative;
      cursor: crosshair;
    }
    canvas#greetingCanvas { width:100%; height:auto; display:block; }

    .drag-hint {
      color: rgba(255,255,255,0.55);
      font-size: 0.82rem;
      text-align: center;
    }

    .actions { display:flex; gap:10px; width:100%; }
    .btn-act {
      flex:1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-dl {
      background: rgba(255,255,255,0.13);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .btn-dl:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); }
    .btn-wa { background: #25d366; color:#fff; }
    .btn-wa:hover { background:#20bd5a; transform:translateY(-2px); box-shadow:0 6px 20px rgba(37,211,102,0.4); }
    .btn-edit {
      background: rgba(221,237,89,0.15);
      color: var(--yellow);
      border: 1px solid rgba(221,237,89,0.3);
    }
    .btn-edit:hover { background: rgba(221,237,89,0.25); transform: translateY(-2px); }

    /* Lanterns */
    .lanterns-top {
      position: fixed; top:0; left:0; right:0;
      display:flex; justify-content:space-between;
      padding:0 5%;
      pointer-events:none; z-index:5;
    }
    .lantern-svg { width:38px; transform-origin:top center; }
    .lantern-svg:nth-child(1) { animation: swing 3.5s ease-in-out infinite; }
    .lantern-svg:nth-child(2) { animation: swing 4s ease-in-out infinite reverse; }
    .lantern-svg:nth-child(3) { animation: swing 3.8s ease-in-out infinite 0.5s; }
    .lantern-svg:nth-child(4) { animation: swing 3.2s ease-in-out infinite 1s reverse; }
    @keyframes swing {
      0%,100% { transform: rotate(-10deg); }
      50%      { transform: rotate(10deg); }
    }

    /* Moon */
    .moon-deco {
      position:fixed; top:70px; left:40px;
      width:70px; pointer-events:none; z-index:5;
      animation: floatMoon 5s ease-in-out infinite;
    }
    @keyframes floatMoon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }


    /* Phone toggle button */
    .btn-phone-toggle {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.07);
      border: 1.5px dashed rgba(255,255,255,0.25);
      border-radius: 12px;
      color: rgba(255,255,255,0.75);
      font-family: 'Tajawal', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      text-align: right;
    }
    .btn-phone-toggle:hover { background: rgba(255,255,255,0.12); border-color: var(--yellow); color:#fff; }
    .toggle-arrow { margin-right: auto; font-size: 1.1rem; color: var(--yellow); transition: transform 0.3s; }
    .toggle-arrow.open { transform: rotate(45deg); }

    /* Phone field collapsible */
    .phone-field-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .phone-field-wrap.open {
      max-height: 300px;
      opacity: 1;
    }
    .phone-field-wrap .phone-row { padding-top: 10px; }

    /* Drag zone overlay */
    .drag-zone {
      position: absolute;
      border: 2px dashed rgba(221,237,89,0.6);
      border-radius: 10px;
      cursor: move;
      background: rgba(221,237,89,0.05);
      transition: background 0.2s;
      display: none;
    }
    .drag-zone.active { display: block; }
    .drag-zone:hover { background: rgba(221,237,89,0.1); }

    /* Move name button */
    .btn-move-name {
      background: rgba(221,237,89,0.12);
      color: var(--yellow);
      border: 1px solid rgba(221,237,89,0.35);
      padding: 10px 18px;
      border-radius: 10px;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items:center; gap:6px;
    }
    .btn-move-name:hover { background: rgba(221,237,89,0.22); }
    .btn-move-name.editing { background: rgba(221,237,89,0.3); border-color: var(--yellow); }

    /* Char counter */
    .char-counter {
      text-align: left;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      transition: color 0.3s;
    }
    .char-counter.warn { color: #ff9a3c; }
    .char-counter.over  { color: #ff5555; }

    /* Mobile full height feel */
    @media(max-width:600px){
      main { padding: 24px 14px 50px; gap: 20px; }
      .form-card { padding: 24px 18px; border-radius: 20px; }
      header { padding: 14px 18px; }
      header img.logo { height: 38px; }
      .actions { gap: 8px; }
      .btn-act { padding: 12px 8px; font-size: 0.88rem; }
      .card-section { gap: 12px; }
    }
    @media(max-width:500px){
      .country-dropdown { right:auto; left:0; }
    }
  </style>
</head>

        </div>

          <input type="tel" id="phoneInput" placeholder="5XXXXXXXX"/>

      <div class="drag-zone" id="dragZone"

           ontouchstart="startDragTouch(event)"></div>

      <span class="drag-hint" id="dragHint" style="font-size:0.78rem;"></span>

// ══════════════════════════════════════════
// CANVAS EFFECTS (Stars, Sparkles, Crescent)
// ══════════════════════════════════════════
const fxCanvas = document.getElementById('fxCanvas');
const fxCtx = fxCanvas.getContext('2d');
let W, H;

function resizeFx() {
  W = fxCanvas.width = window.innerWidth;
  H = fxCanvas.height = window.innerHeight;
}
resizeFx();
window.addEventListener('resize', resizeFx);

// Stars
const stars = Array.from({length: 120}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.8 + 0.4,
  a: Math.random(),
  speed: Math.random() * 0.015 + 0.005,
  phase: Math.random() * Math.PI * 2
}));

// Sparkles (falling)
const sparkles = Array.from({length: 30}, () => makeSparkle());
function makeSparkle() {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * -500 - 50,
    vy: Math.random() * 1.2 + 0.4,
    vx: (Math.random() - 0.5) * 0.5,
    r: Math.random() * 3 + 1,
    a: Math.random(),
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
    color: Math.random() > 0.5 ? '#dded59' : '#ffffff'
  };
}

let frame = 0;
function animateFx() {
  fxCtx.clearRect(0, 0, W, H);
  frame++;

  // Twinkling stars
  stars.forEach(s => {
    const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(frame * s.speed + s.phase));
    fxCtx.beginPath();
    fxCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    fxCtx.fillStyle = `rgba(255,255,220,${alpha})`;
    fxCtx.fill();
  });

  // Falling sparkles (5-pointed stars)
  sparkles.forEach(s => {
    s.y += s.vy;
    s.x += s.vx;
    s.rot += s.rotSpeed;
    if (s.y > H + 20) Object.assign(s, makeSparkle(), {x: Math.random() * W});

    fxCtx.save();
    fxCtx.translate(s.x, s.y);
    fxCtx.rotate(s.rot);
    fxCtx.globalAlpha = 0.7;
    fxCtx.fillStyle = s.color;
    drawStarShape(fxCtx, 0, 0, s.r);
    fxCtx.restore();
  });

  requestAnimationFrame(animateFx);
}

function drawStarShape(ctx, x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const ia = ((i * 4 + 2) * Math.PI / 5) - Math.PI / 2;
    if (i === 0) ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    else ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    ctx.lineTo(x + Math.cos(ia)*(r*0.4), y + Math.sin(ia)*(r*0.4));
  }
  ctx.closePath();
  ctx.fill();
}

animateFx();

// CARD DRAWING
// ══════════════════════════════════════════
function drawAll() {
  const canvas = document.getElementById('greetingCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = CARD_W;
  canvas.height = CARD_H;

  if (cardImg) ctx.drawImage(cardImg, 0, 0, CARD_W, CARD_H);
  else { ctx.fillStyle = '#004cbd'; ctx.fillRect(0, 0, CARD_W, CARD_H); }

  const name = document.getElementById('nameInput').value.trim() || 'الاسم';
  const fontSize = name.length > 12 ? 95 : name.length > 7 ? 115 : 135;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(0,76,189,0.6)';
  ctx.shadowBlur = 25;
  ctx.font = `bold ${fontSize}px ObjektivArabic, Arial`;
  ctx.fillText(name, nameX, nameY);
  ctx.restore();
}

function generateCard() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    const inp = document.getElementById('nameInput');
    inp.focus();
    inp.style.borderColor = '#ff6b6b';
    inp.style.boxShadow = '0 0 0 3px rgba(255,107,107,0.2)';
    setTimeout(() => { inp.style.borderColor = ''; inp.style.boxShadow = ''; }, 1800);
    return;
  }

  // Hide form with animation
  const formCard = document.getElementById('formCard');
  formCard.classList.add('hidden');

  // Show card
  const section = document.getElementById('cardSection');
  section.classList.add('show');

  const tryDraw = () => {
    if (fontLoaded) drawAll();
    else setTimeout(tryDraw, 80);
  };
  tryDraw();

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function editForm() {
  document.getElementById('formCard').classList.remove('hidden');
  document.getElementById('cardSection').classList.remove('show');
  setTimeout(() => document.getElementById('nameInput').focus(), 300);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('nameInput').addEventListener('input', () => {

// ── Move mode
let moveMode = false;
const ZONE_W = 780, ZONE_H = 260; // logical px in card space

function toggleMoveMode() {
  moveMode = !moveMode;
  const btn = document.getElementById('btnMoveName');
  const zone = document.getElementById('dragZone');
  btn.classList.toggle('editing', moveMode);
  btn.textContent = moveMode ? '✓ تثبيت الموضع' : '✦ تعديل موضع الاسم';

  if (moveMode) {
    positionDragZone();
    zone.classList.add('active');
    document.getElementById('dragHint').textContent = 'اسحب المربع لتحريك الاسم';
  } else {
    zone.classList.remove('active');
    document.getElementById('dragHint').textContent = '✓ تم تثبيت الموضع';
    drawAll();
  }
}

function positionDragZone() {
  const canvas = document.getElementById('greetingCanvas');
  const zone = document.getElementById('dragZone');
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / CARD_W;
  const scaleY = rect.height / CARD_H;

  const zw = ZONE_W * scaleX;
  const zh = ZONE_H * scaleY;
  const zx = (nameX - ZONE_W/2) * scaleX;
  const zy = (nameY - ZONE_H/2) * scaleY;

  zone.style.left = zx + 'px';
  zone.style.top  = zy + 'px';
  zone.style.width  = zw + 'px';
  zone.style.height = zh + 'px';
}

// Drag name
function getCanvasPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (CARD_W / rect.width),
    y: (e.clientY - rect.top) * (CARD_H / rect.height)
  };
}
function startDrag(e) {
  if (!moveMode) return;
  e.preventDefault();
  const zone = document.getElementById('dragZone');
  const canvas = document.getElementById('greetingCanvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = CARD_W / rect.width;
  const scaleY = CARD_H / rect.height;

  const startClientX = e.clientX;
  const startClientY = e.clientY;
  const startNameX = nameX;
  const startNameY = nameY;

  document.onmousemove = ev => {
    const dx = (ev.clientX - startClientX) * scaleX;
    const dy = (ev.clientY - startClientY) * scaleY;
    nameX = Math.max(ZONE_W/2, Math.min(CARD_W - ZONE_W/2, startNameX + dx));
    nameY = Math.max(ZONE_H/2, Math.min(CARD_H - ZONE_H/2, startNameY + dy));
    drawAll();
    positionDragZone();
  };
  document.onmouseup = () => {
    document.onmousemove = null;
    document.onmouseup = null;
  };
}

function startDragTouch(e) {
  if (!moveMode) return;
  e.preventDefault();
  const canvas = document.getElementById('greetingCanvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = CARD_W / rect.width;
  const scaleY = CARD_H / rect.height;
  const touch = e.touches[0];
  const startClientX = touch.clientX;
  const startClientY = touch.clientY;
  const startNameX = nameX;
  const startNameY = nameY;

  document.ontouchmove = ev => {
    const t = ev.touches[0];
    const dx = (t.clientX - startClientX) * scaleX;
    const dy = (t.clientY - startClientY) * scaleY;
    nameX = Math.max(ZONE_W/2, Math.min(CARD_W - ZONE_W/2, startNameX + dx));
    nameY = Math.max(ZONE_H/2, Math.min(CARD_H - ZONE_H/2, startNameY + dy));
    drawAll();
    positionDragZone();
    ev.preventDefault();
  };
  document.ontouchend = () => {
    document.ontouchmove = null;
    document.ontouchend = null;
  };
}

function downloadCard() {
  const name = document.getElementById('nameInput').value.trim() || 'بطاقة-العيد';
  const link = document.createElement('a');
  link.download = `تهنئة-${name}.png`;
  link.href = document.getElementById('greetingCanvas').toDataURL('image/png');
  link.click();
}

function sendWhatsApp() {
  const phone = document.getElementById('phoneInput').value.trim().replace(/\D/g,'');
  const name  = document.getElementById('nameInput').value.trim();
  const msg   = `🌙 عيد مبارك ${name}!
كل عام وأنتم بخير ✨`;

  // Step 1: download the image
  downloadCard();

  // Step 2: copy message text to clipboard
  if (navigator.clipboard) {
    navigator.clipboard.writeText(msg).catch(()=>{});
  } else {
    const ta = document.createElement('textarea');
    ta.value = msg; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }

  // Step 3: show toast then open whatsapp
  showToast('📥 تم تحميل الصورة ونسخ الرسالة — الصقها في واتساب');

  setTimeout(() => {
    const encoded = encodeURIComponent(msg);
    const url = phone
      ? `https://wa.me/${selectedDialCode.replace('+','')}${phone}?text=${encoded}`
      : `https://wa.me/?text=${encoded}`;
    window.open(url, '_blank');
  }, 1200);
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
      background:rgba(0,20,60,0.95); color:#fff; padding:13px 22px;
      border-radius:14px; font-family:'Tajawal',sans-serif; font-size:0.92rem;
      border:1px solid rgba(221,237,89,0.4); z-index:9999;
      opacity:0; transition:all 0.35s ease; max-width:320px; text-align:center;
      box-shadow:0 8px 30px rgba(0,0,0,0.4);
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 3500);
}

// close dropdown on enter key
document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') generateCard(); });
